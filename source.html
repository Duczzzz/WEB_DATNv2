<!doctype html>
<html lang="vn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuke DashBoard</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/home.css" />
    <style>
      .box {
        margin: 0px 200px;
        padding: 20px;
        height: auto;
        background-color: whitesmoke;
      }
      pre {
        margin-top: 20px;
        display: block;
        line-height: 1.6;
        font-size: 20px;
        font-weight: bold;
        color: #f2f8ff;
        background: #131b27;
        padding: 10px 14px;
        border-radius: 10px;
        width: fit-content;
      }
      .blockbtn {
        margin: 0 auto;
        margin-top: 10px;
        display: flex;
        flex-direction: row;
        justify-content: center;
        cursor: pointer;
        z-index: 1;
      }
      .btnFunc {
        font-size: 16px;
        width: fit-content;
        background: white;
        font-weight: bold;
      }
      #warn {
        width: fit-content;
        background-color: #f2f8ff;
        color: red;
        font-size: 16px;
        font-weight: bold;
        margin: 10px auto;
        padding: 10px;
      }
      @media (max-width: 1024px) {
        .box {
          margin: 40px auto;
          margin-left: 100px;
          width: fit-content;
        }
        pre {
          font-size: 14px;
        }
      }
      @media (max-width: 736px) {
        .box {
          max-width: fit-content;
          margin-left: 120px;
        }
        pre {
          font-size: 12px;
        }
      }
      @media (min-width: 1080px) {
        .box {
          width: fit-content !important;
          max-width: none !important;
        }
      }
    </style>
  </head>
  <body>
    <h1 class="head">NUKE DASHBOARD</h1>
    <div class="menu">
      <ul>
        <li><a href="home.html">Trang chủ</a></li>
        <li>
          <a href="source.html" style="background-color: brown">Code test</a>
        </li>
        <li><a href="cambien.html">Bảng điều khiển</a></li>
        <li><a id="logout">Đăng xuất</a></li>
      </ul>
    </div>
    <div class="blockbtn">
      <button class="btnFunc" id="bme280">Source BME280</button>
      <button class="btnFunc" id="dht11">Source DHT11</button>
      <button class="btnFunc" id="control">Source Control</button>
      <button class="btnFunc" id="button">Source Button</button>
    </div>
    <h1 id="warn">
      *Lưu ý: Source code ở dưới dành riêng cho board do Nuke DashBoard phát
      triển. <br />Nếu bạn sử dụng board của bạn để test thì vui lòng sửa code
      cấu hình theo board của bạn.
    </h1>
    <div class="container"></div>
    <script>
      document.getElementById("logout").onclick = function () {
        let text = "Bạn có muốn đăng xuất ?";
        if (confirm(text) == true) {
          localStorage.removeItem("cards");
          let user = localStorage.getItem("username");
          user = "";
          localStorage.setItem("username", user);
          window.location.href = "index.html";
        } else {
          return;
        }
      };
    </script>
    <script type="module" src="js/source.js"></script>
  </body>
</html>
